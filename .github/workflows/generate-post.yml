name: "Генерация статьи из Issue"

on:
  issues:
    types: [opened]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Создать файл из Issue
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q '.body')
          TITLE=$(echo "$ISSUE_BODY" | grep -A 10 "Заголовок статьи" | tail -1 | sed 's/^- //')
          DATE=$(date +'%Y-%m-%d')
          mkdir -p posts
          echo "---" > posts/test.md
          echo "title: \"${TITLE}\"" >> posts/test.md
          echo "date: \"${DATE}\"" >> posts/test.md
          echo "layout: layout.njk" >> posts/test.md
          echo "---" >> posts/test.md
          echo "" >> posts/test.md
          echo "# ${TITLE}" >> posts/test.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: article
          path: posts/*.md
