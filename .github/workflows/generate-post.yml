name: "Генерация статьи из Issue"

on:
  issues:
    types: [opened]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Получение данных Issue через API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Получаем Issue через API
          ISSUE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}")
          
          # Извлекаем тело Issue
          ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body')

          # Извлекаем поля формы
          TITLE=$(echo "$ISSUE_BODY" | sed -n '/### Заголовок статьи/,/###/p' | tail -n +2 | head -1 | sed 's/^- //' | xargs)
          CATEGORY=$(echo "$ISSUE_BODY" | sed -n '/### Рубрика/,/###/p' | tail -n +2 | head -1 | xargs)
          DESCRIPTION=$(echo "$ISSUE_BODY" | sed -n '/### Краткое описание/,/###/p' | tail -n +2 | head -1 | sed 's/^- //' | xargs)
          IMAGE=$(echo "$ISSUE_BODY" | sed -n '/### Имя картинки/,/###/p' | tail -n +2 | head -1 | xargs)
          CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### Текст статьи/,$p' | tail -n +2)

          # Генерация имени файла
          SLUG=$(echo "$TITLE" | tr ' ' '-' | tr -cd 'a-zA-Z0-9\-' | tr '[:upper:]' '[:lower:]')
          DATE=$(date +'%Y-%m-%d')

          # Создаём папку
          mkdir -p posts

          # Создаём Markdown-файл
          cat > "posts/${SLUG}.md" << EOF
---
title: "${TITLE}"
date: "${DATE}"
category: "${CATEGORY}"
description: "${DESCRIPTION}"
image: "/images/${IMAGE}"
layout: layout.njk
---

<div class="article">
    <h1>{{ title }}</h1>
    <div class="meta">📅 {{ date | date: "%d.%m.%Y" }} • {{ category }}</div>

    <img src="{{ image }}" alt="">

${CONTENT}
</div>
EOF
          echo "✅ Создан файл: posts/${SLUG}.md"

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: article
          path: posts/*.md
