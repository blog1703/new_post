name: "Генерация статьи из Issue"

on:
  issues:
    types: [opened]

jobs:
  generate:
    if: contains(github.event.issue.labels.*.name, 'article')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Парсинг и создание файла
        run: |
          # Устанавливаем jq для парсинга JSON
          sudo apt-get install -y jq

          # Получаем данные Issue через GitHub API
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER --json body -q '.body')

          # Извлекаем поля из формы
          TITLE=$(echo "$ISSUE_BODY" | sed -n '/### Заголовок статьи/,/###/p' | tail -n +2 | head -1 | xargs)
          CATEGORY=$(echo "$ISSUE_BODY" | sed -n '/### Рубрика/,/###/p' | tail -n +2 | head -1 | xargs)
          DESCRIPTION=$(echo "$ISSUE_BODY" | sed -n '/### Краткое описание/,/###/p' | tail -n +2 | head -1 | xargs)
          IMAGE=$(echo "$ISSUE_BODY" | sed -n '/### Имя картинки/,/###/p' | tail -n +2 | head -1 | xargs)
          CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### Текст статьи/,$p' | tail -n +2 | sed '/^$/d')

          # Генерируем имя файла из заголовка
          SLUG=$(echo "$TITLE" | iconv -f utf-8 -t ascii//translit | tr ' ' '-' | tr -cd 'a-zA-Z0-9\-' | tr '[:upper:]' '[:lower:]')
          DATE=$(date +'%Y-%m-%d')

          # Создаём папку
          mkdir -p posts

          # Создаём файл
          cat > "posts/${SLUG}.md" << EOF
---
title: "${TITLE}"
date: "${DATE}"
category: "${CATEGORY}"
description: "${DESCRIPTION}"
image: "/images/${IMAGE}"
layout: layout.njk
---

<div class="article">
    <h1>{{ title }}</h1>
    <div class="meta">📅 {{ date | date: "%d.%m.%Y" }} • {{ category }}</div>

    <img src="{{ image }}" alt="">

    ${CONTENT}
</div>
EOF
          echo "✅ Создан файл: posts/${SLUG}.md"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: article
          path: posts/*.md
