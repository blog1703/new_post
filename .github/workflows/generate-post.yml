name: "Генерация статьи из Issue"

on:
  issues:
    types: [opened]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка jq
        run: sudo apt-get install -y jq

      - name: Получение и парсинг Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Получаем данные Issue через API
          ISSUE_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}")
          
          # Извлекаем тело Issue
          ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body')

          # ОТЛАДКА: выводим тело Issue
          echo "=== ISSUE_BODY ==="
          echo "$ISSUE_BODY"
          echo "=================="

          # Извлекаем поля формы
          TITLE=$(echo "$ISSUE_BODY" | awk '/### Заголовок статьи/{getline; print}' | sed 's/^- //' | xargs)
          CATEGORY=$(echo "$ISSUE_BODY" | awk '/### Рубрика/{getline; print}' | xargs)
          DESCRIPTION=$(echo "$ISSUE_BODY" | awk '/### Краткое описание/{getline; print}' | sed 's/^- //' | xargs)
          IMAGE=$(echo "$ISSUE_BODY" | awk '/### Имя картинки/{getline; print}' | xargs)
          CONTENT=$(echo "$ISSUE_BODY" | sed -n '/### Текст статьи/,$p' | tail -n +2)

          # ОТЛАДКА: выводим извлечённые поля
          echo "TITLE: $TITLE"
          echo "CATEGORY: $CATEGORY"
          echo "DESCRIPTION: $DESCRIPTION"
          echo "IMAGE: $IMAGE"
          echo "CONTENT: $CONTENT"

          # Генерация имени файла
          SLUG=$(echo "$TITLE" | tr ' ' '-' | tr -cd 'a-zA-Z0-9\-' | tr '[:upper:]' '[:lower:]')
          DATE=$(date +'%Y-%m-%d')

          # Создаём папку
          mkdir -p posts

          # Создаём Markdown-файл
          cat > "posts/${SLUG}.md" <<EOF
---
title: "${TITLE}"
date: "${DATE}"
category: "${CATEGORY}"
description: "${DESCRIPTION}"
image: "/images/${IMAGE}"
layout: layout.njk
---

<div class="article">
    <h1>{{ title }}</h1>
    <div class="meta">📅 {{ date | date: "%d.%m.%Y" }} • {{ category }}</div>

    <img src="{{ image }}" alt="">

${CONTENT}
</div>
EOF
          echo "✅ Создан файл: posts/${SLUG}.md"
          
          # Проверяем, что файл создался
          ls -la posts/

      - name: Загрузить артефакт
        uses: actions/upload-artifact@v4
        with:
          name: article
          path: posts/*.md
