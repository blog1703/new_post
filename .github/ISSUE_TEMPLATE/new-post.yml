name: "📝 Новая статья"
description: "Создать новую статью для блога"
title: "[СТАТЬЯ]: "
labels: ["article"]
body:
  - type: input
    id: title
    attributes:
      label: "Заголовок статьи"
      placeholder: "Как отремонтировать диван"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "Рубрика"
      options:
        - "Ремонт"
        - "Идеи"
        - "Декор"
    validations:
      required: true

  - type: input
    id: description
    attributes:
      label: "Краткое описание"
      placeholder: "Пошаговая инструкция по ремонту дивана"
    validations:
      required: true

  - type: input
    id: image
    attributes:
      label: "Имя картинки"
      description: "Файл должен лежать в папке /images/"
      placeholder: "divan.jpg"
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: "Текст статьи"
      description: "Пиши в Markdown. Заголовки H2 начинай с ##"
      placeholder: |
        ## 1. Планирование
        Сначала продумай всё...

        > 💡 Совет: Не забудь заложить бюджет
    validations:
      required: true
