<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуальный редактор статей | Угол Дома</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
</head>
<body>

<div class="container">
    <h1>📝 Визуальный редактор статей</h1>
    
    <label>Заголовок статьи (H1)</label>
    <input type="text" id="title" placeholder="Как отремонтировать диван">

    <label>Рубрика</label>
    <select id="category">
        <option value="Ремонт">🔧 Ремонт</option>
        <option value="Идеи">💡 Идеи</option>
        <option value="Декор">🎨 Декор</option>
        <option value="Советы">📌 Советы</option>
    </select>

    <label>Краткое описание (meta description)</label>
    <input type="text" id="description" placeholder="Пошаговая инструкция по ремонту дивана...">

    <label>Имя картинки (например, divan.jpg)</label>
    <input type="text" id="image" placeholder="divan.jpg">

    <label>Текст статьи — Markdown</label>
    <textarea id="content"></textarea>

    <button id="downloadBtn">📥 Скачать статью (.md)</button>

    <div class="note">
        💡 <strong>Инструменты:</strong> Жирный (B) | Курсив (I) | Заголовки (#) | Списки (•/1.) | Цитата (") | Ссылка (🔗) | Картинка (🖼️) | Предпросмотр (👁️)
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
